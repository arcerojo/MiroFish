# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - mirofish

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: acrmirofishllazul.azurecr.io/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_DEB34B9359CD455DB0C6B8D3E26F1C3B }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_090BD212DB41466FA2FB561D5F705DAF }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: acrmirofishllazul.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_DEB34B9359CD455DB0C6B8D3E26F1C3B }}/mirofish:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    needs: build
    
    steps:
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_C945CA38692E473BBDE49D37E978D43D }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_5A80CF15B6844F459C0392F530328268 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_FBA493AC46704B8CB26DB19247A59FB7 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'mirofish'
          slot-name: 'Production'
          images: 'acrmirofishllazul.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_DEB34B9359CD455DB0C6B8D3E26F1C3B }}/mirofish:${{ github.sha }}'
          